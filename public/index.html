<title>CRM MySelec · Sistema de Gestión Comercial</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['"Helvetica Neue"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'system-ui', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'monospace'],
        },
        colors: {
          /* ── Myselec 2022 brand identity ── */
          navy:    { 950: '#00304D', 900: '#004669', 800: '#0A5A82', 700: '#156D98' },
          ink:     { 900: '#231F20', 700: '#3D393A', 500: '#939598', 400: '#BCBEC0', 300: '#D8D9DB' },
          line:    '#E0E2E4',
          surface: '#F4F5F6',
          brand:   '#20759E',
          brandSoft:'#E4F0F7',
          ok:      '#16A76E',
          warn:    '#E5930A',
          bad:     '#D93636',
          purple6: '#7C5AC7',
          sky5:    '#20759E',
          orange5: '#E5760A',
        },
        boxShadow: {
          card: '0 1px 3px 0 rgba(0,70,105,0.04), 0 1px 2px -1px rgba(0,70,105,0.06)',
          pop:  '0 12px 36px -10px rgba(0,70,105,0.22), 0 4px 10px -4px rgba(0,70,105,0.08)',
        }
      }
    }
  }
</script>

<style>
  /* ── Myselec CRM — global styles ── */
  html, body {
    font-family: "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: #231F20; background: #F4F5F6;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* Scrollbar */
  .scroll-thin::-webkit-scrollbar { height: 8px; width: 8px; }
  .scroll-thin::-webkit-scrollbar-thumb { background: #BCBEC0; border-radius: 8px; }
  .scroll-thin::-webkit-scrollbar-track { background: transparent; }

  /* Stripe placeholder */
  .stripe-ph { background-image: repeating-linear-gradient(45deg, #EDF0F2 0 8px, #F5F6F7 8px 16px); }

  /* Stepper line */
  .stepline::before {
    content:""; position:absolute; left:11px; top:22px; bottom:-4px;
    border-left: 2px dotted #BCBEC0;
  }
  .stepline:last-child::before { display:none; }

  /* Kanban cards */
  .kcard { transition: transform .18s cubic-bezier(.32,.72,0,1), box-shadow .18s cubic-bezier(.32,.72,0,1); }
  .kcard:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px -8px rgba(0,70,105,0.16), 0 2px 6px -2px rgba(0,70,105,0.08);
  }

  /* ── Inputs ── */
  .inp {
    background: #fff; border: 1px solid #E0E2E4; border-radius: 8px;
    padding: 8px 12px; font-size: 13.5px; outline: none; color: #231F20;
    transition: border-color .2s, box-shadow .2s;
  }
  .inp::placeholder { color: #939598; }
  .inp:focus { border-color: #20759E; box-shadow: 0 0 0 3px rgba(32,117,158,0.12); }

  /* ── Buttons ── */
  .btn-primary, .btn-ghost, .btn-accent {
    display: inline-flex; align-items: center; gap: 8px; font-size: 13.5px; font-weight: 500;
    border-radius: 8px; padding: 8px 14px;
    transition: all .2s cubic-bezier(.32,.72,0,1);
    cursor: pointer; border: 1px solid transparent; white-space: nowrap;
  }
  .btn-primary { background: #004669; color: #fff; }
  .btn-primary:hover { background: #0A5A82; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-ghost { background: #fff; border-color: #E0E2E4; color: #3D393A; }
  .btn-ghost:hover { background: #F4F5F6; border-color: #D8D9DB; }
  .btn-accent { background: #20759E; color: #fff; }
  .btn-accent:hover { background: #1A6384; }
  .btn-accent:active { transform: scale(0.98); }

  /* ── Chips & Tables ── */
  .chip { display:inline-flex; align-items:center; gap:4px; border-radius:6px; font-size:11px; font-weight:500; padding:2px 6px; }
  .tbl th {
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.05em;
    font-weight:600; color:#939598; padding:10px 16px; background:#F4F5F6; border-bottom:1px solid #E0E2E4;
  }
  .tbl td { padding:12px 16px; font-size:13.5px; color:#3D393A; border-bottom:1px solid #E0E2E4; }
  .tbl tr:hover td { background:#F9FAFB; }

  /* Kanban column */
  .kcol-body { max-height: calc(100vh - 290px); overflow-y: auto; }

  /* Sparkline grid */
  .spark-grid { background-image: linear-gradient(to right, #ECF0F3 1px, transparent 1px); background-size: 20% 100%; }

  /* Modal enter */
  .modal-enter { animation: modalIn .22s cubic-bezier(.32,.72,0,1); }
  @keyframes modalIn { from { opacity: 0; transform: translateY(8px) scale(0.98);} to { opacity: 1; transform: none;} }

  /* Selection */
  ::selection { background: rgba(32,117,158,0.15); color: #004669; }
</style>
